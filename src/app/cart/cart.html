<p class="fs-5 fw-bold mb-3">🛒 Carrito de Compras</p>


<div *ngIf="(cartList$ | async) as cartList">
  
  
  <div *ngIf="cartList.length === 0" class="alert alert-light text-center py-2 mb-0 border">
    <small class="text-muted">No hay productos seleccionados.</small>
  </div>


  <div *ngIf="cartList.length > 0">
    <ul class="list-group list-group-flush mb-3">
      
      <li *ngFor="let shoe of cartList" class="list-group-item d-flex justify-content-between align-items-center px-0">
        <div>
          <span class="fw-semibold">{{ shoe.name }}</span>
          <br>
          <small class="text-muted">${{ shoe.price }} c/u</small>
        </div>
        <span class="badge bg-secondary rounded-pill">X{{ shoe.quantity }}</span>
      </li>
    </ul>

    
    <div class="d-flex justify-content-between align-items-center pt-2 border-top">
      <span class="fw-bold text-uppercase small text-muted">Total:</span>
      
      <span class="fs-5 fw-bold text-success">${{ getTotal(cartList) }}</span>
    </div>
  </div>

</div>
